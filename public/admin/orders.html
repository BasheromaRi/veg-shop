<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>طلبات الزبائن</title>

  <link rel="stylesheet" href="/styles.css" />

  <style>
    .wrap { margin-top: 12px; }

    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px; flex-wrap:wrap; margin: 10px 0 14px;
    }
    .filters{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .pill{
      border:1px solid #d7e2db; background:#fff; padding:8px 10px;
      border-radius:999px; cursor:pointer; font-weight:900; font-size:13px;
    }
    .pill.active{ background:#eaf5ef; border-color:#9dd3b1; }

    .search{ flex:1; min-width: 220px; display:flex; gap:8px; align-items:center; }
    .search input{
      width:100%; padding:10px 12px; border:1px solid #d7e2db;
      border-radius:12px; font-size:14px;
    }
    .hint{ color:#6a7b72; font-size:12px; margin-top:6px; line-height:1.4; }

    .countBox{
      background:#eef6ff;
      border:1px solid #b9d7ff;
      padding:10px 12px;
      border-radius:12px;
      font-weight:1000;
      margin-bottom:10px;
      text-align:center;
      color:#0b3c75;
    }

    #ordersList{
      display:grid;
      gap:12px;
      margin: 12px 0 18px;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      align-items:start;
    }

    .orderCard{
      background:#fff;
      border:1px solid #dfe7e2;
      border-radius:16px;
      padding:12px;
      box-shadow: 0 1px 10px rgba(0,0,0,.06);
      text-align:right;
      cursor: default;
    }

    .cardHead{
      display:flex; justify-content:space-between; align-items:flex-start;
      gap:10px; flex-wrap:wrap; margin-bottom:10px;
    }
    .orderTitle{ font-weight:1000; color:#0f2b1f; font-size:16px; }
    .meta{ color:#6a7b72; font-size:12px; margin-top:4px; direction:ltr; text-align:left; }

    .badge{
      padding:6px 10px; border-radius:999px; font-weight:900;
      font-size:12px; border:1px solid transparent; white-space:nowrap;
      display:inline-flex; align-items:center; gap:6px;
    }
    .b-new{ background:#fff7e6; border-color:#ffd38a; color:#7a4b00; }
    .b-delivery{ background:#fff3e6; border-color:#ffb366; color:#b35a00; }
    .b-done{ background:#eaf7ef; border-color:#a8e0be; color:#0f5a2a; }
    .b-cancel{ background:#ffecec; border-color:#ffc0c0; color:#8a1414; }
    .b-contact{ background:#f1ecff; border-color:#d2c0ff; color:#4b2b8a; }
    .b-courier{ background:#eef6ff; border-color:#b9d7ff; color:#0b3c75; }

    .rows{ display:grid; gap:8px; margin: 8px 0 12px; }
    .row{
      display:flex; justify-content:space-between; gap:10px;
      flex-wrap:wrap; font-size:14px;
    }
    .label{ color:#6a7b72; font-size:12px; }

    .val{
      font-weight:900;
      text-align:right;
      direction:rtl;
      unicode-bidi: plaintext;
      max-width: 72%;
      word-break: break-word;
      color:#111;
    }
    .valNum{
      direction:ltr;
      text-align:left;
      unicode-bidi: plaintext;
    }

    .items{ margin-top:10px; border-top:1px dashed #d7e2db; padding-top:10px; }
    .itemLine{
      display:flex; justify-content:space-between; gap:10px;
      padding:8px 0; border-bottom:1px solid #f0f3f1; font-size:14px;
    }
    .itemLine:last-child{ border-bottom:none; }
    .muted{ color:#6a7b72; font-size:12px; }

    .summary{
      margin-top:10px;
      padding:10px;
      border-radius:14px;
      background:#f6fbf8;
      border:1px solid #cfe3d6;
      display:grid;
      gap:8px;
      font-weight:1000;
    }
    .sumRow{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
    }
    .sumRow small{ font-weight:900; color:#6a7b72; }

    .cancelBox{
      margin-top:10px;
      padding:10px;
      border-radius:14px;
      background:#ffecec;
      border:1px solid #ffc0c0;
      color:#8a1414;
      font-weight:900;
      line-height:1.6;
    }
    .cancelBox small{
      display:block;
      color:#8a1414;
      opacity:.85;
      margin-bottom:4px;
      font-weight:1000;
    }

    .actions{
      display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end;
      margin-top:12px;
    }
    .btn{
      border:none; border-radius:12px; padding:10px 12px;
      cursor:pointer; font-weight:1000; font-size:13px;
      text-decoration:none; display:inline-block;
    }
    .btn:active{ transform: scale(.99); }
    .btn-green{ background:#2e8b57; color:#fff; }
    .btn-blue{ background:#2b74c7; color:#fff; }
    .btn-red{ background:#d83a3a; color:#fff; }
    .btn-light{ background:#eaf5ef; color:#0f2b1f; }

    .btn-courier{ background:#0b5bd3; color:#fff; }
    .btn-courier-off{ background:#e9f2ff; color:#0b3c75; border:1px solid #b9d7ff; }

    .statusLine{
      display:flex; align-items:center; gap:8px; flex-wrap:wrap;
      justify-content:space-between; margin-top:12px;
    }
    select{
      padding:10px 12px; border:1px solid #d7e2db;
      border-radius:12px; font-weight:900; background:#fff;
      min-width: 180px;
    }

    .empty{
      padding:14px; background:#fff; border:1px solid #dfe7e2;
      border-radius:14px; color:#6a7b72;
    }

    @media (max-width:700px){
      #ordersList{ grid-template-columns: 1fr; }
      .actions{ justify-content:stretch; }
      .btn{ width:100%; text-align:center; }
      select{ width:100%; }
      .val{ max-width: 100%; }
    }
  </style>
</head>

<body style="text-align:right;">
  <header>
    <span>طلبات الزبائن</span>
    <a href="/admin/secret-admin-9347" style="color:#fff; float:left; text-decoration:none; font-size:14px;">
      الرجوع للوحة
    </a>
  </header>

  <div class="container wrap">
    <div class="topbar">
      <div class="filters">
        <button class="pill active" data-filter="all">الكل</button>
        <button class="pill" data-filter="courier">للشليح</button>
        <button class="pill" data-filter="new">جديد</button>
        <button class="pill" data-filter="contacted">تم التواصل</button>
        <button class="pill" data-filter="out_for_delivery">🚚 قيد التوصيل</button>
        <button class="pill" data-filter="done">تم التوصيل</button>
        <button class="pill" data-filter="cancelled">ملغي</button>
      </div>

      <div class="search">
        <input id="q" type="text" placeholder="ابحث بالاسم / الهاتف / البلد..." />
      </div>
    </div>

    <div class="hint">
      التوصيل مجاني فوق 300₪ — وتحت 300₪ التوصيل 30₪.
      ✅ “للشليح” يعني الطلب تم اختياره للشليح فقط.
    </div>

    <div id="ordersCountAdmin" class="countBox">عدد الطلبات: 0</div>

    <div id="ordersList">تحميل...</div>
  </div>

  <script>
    const list = document.getElementById('ordersList');
    const q = document.getElementById('q');
    const ordersCountAdmin = document.getElementById('ordersCountAdmin');

    let orders = [];
    let currentFilter = 'all';

    const FREE_DELIVERY_FROM = 300;
    const DELIVERY_FEE = 30;
    const DEFAULT_COUNTRY_CODE = '972';

    function esc(s){
      return String(s ?? '').replace(/[&<>"']/g, (m) => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[m]));
    }

    function formatDate(iso){
      try{
        const d = new Date(iso);
        return d.toLocaleString('en-GB', {
          year:'numeric', month:'2-digit', day:'2-digit',
          hour:'2-digit', minute:'2-digit', hour12:false
        });
      }catch(e){ return iso || ''; }
    }

    function statusBadge(status){
      const s = status || 'new';
      if (s === 'done') return `<span class="badge b-done">تم التوصيل</span>`;
      if (s === 'out_for_delivery') return `<span class="badge b-delivery">🚚 قيد التوصيل</span>`;
      if (s === 'contacted') return `<span class="badge b-contact">تم التواصل</span>`;
      if (s === 'cancelled') return `<span class="badge b-cancel">ملغي</span>`;
      return `<span class="badge b-new">جديد</span>`;
    }

    function courierBadge(assigned){
      return assigned ? `<span class="badge b-courier">للشليح ✅</span>` : '';
    }

    function calcSubtotal(items){
      return (items || []).reduce((sum, i) => sum + (Number(i.price)||0) * (Number(i.qty)||0), 0);
    }
    function calcDelivery(subtotal){
      return subtotal >= FREE_DELIVERY_FROM ? 0 : DELIVERY_FEE;
    }
    function calcGrandTotal(items){
      const subtotal = calcSubtotal(items);
      const delivery = calcDelivery(subtotal);
      return { subtotal, delivery, total: subtotal + delivery };
    }

    function normalizeOrder(o){
      let items = o.items;
      if (typeof items === 'string'){
        try{ items = JSON.parse(items); } catch(e){ items = []; }
      }
      return {
        ...o,
        items: Array.isArray(items) ? items : [],
        assignedToCourier: Number(o.assignedToCourier || 0),
        cancelReason: o.cancelReason || '',
        notes: o.notes || ''
      };
    }

    function normalizePhoneToE164(phone){
      let digits = String(phone || '').replace(/\D/g,'');
      if (!digits) return '';
      if (digits.startsWith('00')) digits = digits.slice(2);
      if (digits.startsWith(DEFAULT_COUNTRY_CODE)) return digits;
      if (digits.startsWith('0')) return DEFAULT_COUNTRY_CODE + digits.slice(1);
      if (digits.length >= 8 && digits.length <= 10) return DEFAULT_COUNTRY_CODE + digits;
      return digits;
    }

    function buildWhatsappText(order){
      const items = (order.items || []).map(i =>
        `- ${i.name} — ${i.qty} ${i.unitType === 'bag' ? 'كيس' : 'كغم'} — ₪${(Number(i.price)||0) * (Number(i.qty)||0)}`
      ).join('\n');

      const { subtotal, delivery, total } = calcGrandTotal(order.items || []);
      const deliveryText = delivery === 0 ? 'توصيل مجاني ✅' : `₪${delivery}`;

      return `مرحبا ${order.name || ''} 👋
تم تلقي طلبك بنجاح ✅
تفاصيل الطلب (#${order.id}):

${items || '- (لا يوجد منتجات)'}

المجموع قبل التوصيل: ₪${subtotal}
تكلفة التوصيل: ${deliveryText}
المجموع الكلي للدفع: ₪${total}

يرجى إرسال مَوقع (Location) على واتساب لتأكيد وتجهيز الطلب ✅`;
    }

    function makeWhatsAppLink(phoneE164, text){
      const msg = encodeURIComponent(text || '');
      return `https://wa.me/${phoneE164}?text=${msg}`;
    }

    async function fetchOrders(){
      list.innerHTML = 'تحميل...';
      try{
        const res = await fetch('/api/orders', { credentials:'include' });
        if (!res.ok){
          if (res.status === 401){ window.location.href = '/login.html'; return; }
          list.innerHTML = `<div class="empty">خطأ في تحميل الطلبات.</div>`;
          return;
        }
        const data = await res.json();
        orders = (data || []).map(normalizeOrder);
        render();
      }catch(err){
        console.error(err);
        list.innerHTML = `<div class="empty">مشكلة اتصال بالسيرفر.</div>`;
      }
    }

    function matchesSearch(order, text){
      if (!text) return true;
      const t = text.toLowerCase();
      const hay = `${order.name||''} ${order.phone||''} ${order.country||''} ${order.address||''}`.toLowerCase();
      return hay.includes(t);
    }

    function matchesFilter(order){
      if (currentFilter === 'all') return true;
      if (currentFilter === 'courier') return Number(order.assignedToCourier || 0) === 1;
      return (order.status || 'new') === currentFilter;
    }

    function render(){
      const text = q.value.trim();
      const filtered = orders
        .filter(o => matchesFilter(o))
        .filter(o => matchesSearch(o, text))
        .sort((a,b) => (b.id||0) - (a.id||0));

      ordersCountAdmin.textContent = `عدد الطلبات: ${filtered.length}`;

      if (!filtered.length){
        list.innerHTML = `<div class="empty">لا توجد طلبات بهذه الفلترة.</div>`;
        return;
      }

      list.innerHTML = filtered.map(o => {
        const { subtotal, delivery, total } = calcGrandTotal(o.items || []);
        const phoneE164 = normalizePhoneToE164(o.phone || '');
        const waLink = phoneE164 ? makeWhatsAppLink(phoneE164, buildWhatsappText(o)) : null;

        const itemsHtml = (o.items || []).map(it => {
          const unit = it.unitType === 'bag' ? 'كيس' : 'كغم';
          const line = (Number(it.price)||0) * (Number(it.qty)||0);
          return `
            <div class="itemLine">
              <div>
                <strong>${esc(it.name)}</strong>
                <div class="muted">${esc(it.qty)} ${unit} × ₪${esc(it.price)}</div>
              </div>
              <div style="font-weight:1000;" class="valNum">₪${esc(line)}</div>
            </div>
          `;
        }).join('');

        const isAssigned = Number(o.assignedToCourier || 0) === 1;

        const cancelHtml = (o.status === 'cancelled' && (o.cancelReason || '').trim())
          ? `<div class="cancelBox"><small>سبب الإلغاء</small>${esc(o.cancelReason)}</div>`
          : '';

        return `
          <div class="orderCard">
            <div class="cardHead">
              <div>
                <div class="orderTitle">طلب رقم #${esc(o.id)}</div>
                <div class="meta">${formatDate(o.createdAt)}</div>
              </div>
              <div style="display:flex; gap:8px; flex-wrap:wrap;">
                ${courierBadge(isAssigned)}
                ${statusBadge(o.status)}
              </div>
            </div>

            <div class="rows">
              <div class="row"><div class="label">الاسم</div><div class="val">${esc(o.name || '-')}</div></div>
              <div class="row"><div class="label">الهاتف</div><div class="val valNum">${esc(o.phone || '-')}</div></div>
              <div class="row"><div class="label">البلد</div><div class="val">${esc(o.country || '-')}</div></div>
              <div class="row"><div class="label">العنوان</div><div class="val">${esc(o.address || '-')}</div></div>
              <div class="row"><div class="label">ملاحظات</div><div class="val">${esc(o.notes || '-')}</div></div>
            </div>

            ${cancelHtml}

            <div class="items">
              <div style="font-weight:1000; margin-bottom:8px;">المنتجات</div>
              ${itemsHtml || '<div class="muted">لا يوجد منتجات</div>'}
            </div>

            <div class="summary">
              <div class="sumRow"><small>المجموع قبل التوصيل</small><div class="val valNum">₪${esc(subtotal)}</div></div>
              <div class="sumRow"><small>التوصيل</small><div class="val valNum">${delivery === 0 ? 'مجاني ✅' : '₪' + esc(delivery)}</div></div>
              <div class="sumRow" style="border-top:1px dashed #cfe3d6; padding-top:8px;">
                <small>المجموع الكلي</small><div class="val valNum">₪${esc(total)}</div>
              </div>
            </div>

            <div class="statusLine">
              <div style="font-weight:1000;">تغيير الحالة</div>
              <select onchange="updateStatus(${esc(o.id)}, this.value)">
                <option value="new" ${(o.status||'new')==='new' ? 'selected':''}>جديد</option>
                <option value="contacted" ${(o.status||'new')==='contacted' ? 'selected':''}>تم التواصل</option>
                <option value="out_for_delivery" ${(o.status||'new')==='out_for_delivery' ? 'selected':''}>🚚 قيد التوصيل</option>
                <option value="done" ${(o.status||'new')==='done' ? 'selected':''}>تم التوصيل</option>
                <option value="cancelled" ${(o.status||'new')==='cancelled' ? 'selected':''}>ملغي</option>
              </select>
            </div>

            <div class="actions">
              ${
                waLink
                ? `<a class="btn btn-green" rel="noopener" target="_blank" href="${waLink}">واتساب</a>
                   <button class="btn btn-blue" type="button" onclick="contactAndOpen(${esc(o.id)}, '${waLink.replace(/'/g,"\\'")}')">تم التواصل + واتساب</button>`
                : `<button class="btn btn-light" type="button" disabled>لا يوجد رقم واتساب</button>`
              }

              <button
                class="btn ${isAssigned ? 'btn-courier-off' : 'btn-courier'}"
                type="button"
                onclick="toggleCourier(${esc(o.id)}, ${isAssigned ? 'true' : 'false'})">
                ${isAssigned ? 'إزالة من الشليح' : 'إرسال للشليح'}
              </button>

              <button class="btn btn-red" type="button" onclick="deleteOrder(${esc(o.id)})">حذف الطلب</button>
            </div>
          </div>
        `;
      }).join('');
    }

    document.querySelectorAll('.pill').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });

    q.addEventListener('input', () => render());

    window.updateStatus = async function(id, status){
      const prev = orders.find(o => o.id == id);
      const oldStatus = prev ? (prev.status || 'new') : 'new';

      let cancelReason = '';
      if (status === 'cancelled'){
        cancelReason = (prompt('ليش انلغى الطلب؟ اكتب سبب الإلغاء:') || '').trim();
        if (!cancelReason){
          alert('لازم تكتب سبب الإلغاء');
          render();
          return;
        }
      }

      try{
        const res = await fetch(`/api/orders/${id}/status`, {
          method: 'PUT',
          headers: { 'Content-Type':'application/json' },
          credentials:'include',
          body: JSON.stringify({ status, cancelReason: status === 'cancelled' ? cancelReason : '' })
        });

        if (!res.ok){
          if (res.status === 401){ window.location.href = '/login.html'; return; }
          alert('فشل تغيير الحالة');
          if (prev) prev.status = oldStatus;
          render();
          return;
        }

        const idx = orders.findIndex(o => o.id == id);
        if (idx >= 0){
          orders[idx].status = status;
          orders[idx].cancelReason = (status === 'cancelled') ? cancelReason : '';
        }
        render();
      }catch(err){
        console.error(err);
        alert('مشكلة اتصال بالسيرفر');
        if (prev) prev.status = oldStatus;
        render();
      }
    };

    window.contactAndOpen = async function(id, waLink){
      await window.updateStatus(id, 'contacted');
      window.location.href = waLink;
    };

    window.toggleCourier = async function(id, isAssignedNow){
      const newVal = !isAssignedNow;
      try{
        const res = await fetch(`/api/orders/${id}/assign`, {
          method:'PUT',
          headers:{'Content-Type':'application/json'},
          credentials:'include',
          body: JSON.stringify({ assigned: newVal })
        });

        const data = await res.json().catch(()=>({}));
        if (!res.ok){
          if (res.status === 401){ window.location.href = '/login.html'; return; }
          alert(data?.error || 'فشل إرسال الطلب للشليح');
          return;
        }

        const idx = orders.findIndex(o => o.id == id);
        if (idx >= 0){
          orders[idx].assignedToCourier = newVal ? 1 : 0;
          if (newVal) orders[idx].status = 'out_for_delivery';
        }

        render();
      }catch(err){
        console.error(err);
        alert('مشكلة اتصال بالسيرفر');
      }
    };

    window.deleteOrder = async function(id){
      if (!confirm('متأكد بدك تحذف الطلب؟')) return;

      try{
        const res = await fetch(`/api/orders/${id}`, { method:'DELETE', credentials:'include' });

        if (!res.ok){
          if (res.status === 401){ window.location.href = '/login.html'; return; }
          alert('فشل حذف الطلب');
          return;
        }

        orders = orders.filter(o => o.id != id);
        render();
      }catch(err){
        console.error(err);
        alert('مشكلة اتصال بالسيرفر');
      }
    };

    fetchOrders();
  </script>
</body>
</html>
