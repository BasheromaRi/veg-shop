<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مراجعة الطلب</title>
  <link rel="stylesheet" href="/styles.css">

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      overflow-x:hidden;
      text-align:right;
    }

    .container{
      max-width:780px;
      margin:auto;
      padding:16px;
    }

    .cart-box{
      background:#fffdf8;
      border:1px solid #e7e2d6;
      border-radius:20px;
      padding:14px;
      margin-bottom:16px;
      box-shadow:0 6px 18px rgba(0,0,0,.05);
    }

    .cart-item{
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-size:14px;
      padding:8px 0;
      border-bottom:1px dashed #e7e2d6;
      line-height:1.5;
    }

    .cart-item:last-child{
      border-bottom:none;
    }

    .cart-summary{
      margin-top:12px;
      padding:12px;
      border-radius:16px;
      background:#f7fbf8;
      border:1px solid #d8e8dc;
      display:grid;
      gap:10px;
    }

    .summary-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      font-size:15px;
      font-weight:900;
      color:#1f3b2d;
    }

    .summary-row small{
      color:#6a7b72;
      font-weight:1000;
      font-size:13px;
    }

    .summary-total{
      padding-top:10px;
      border-top:1px dashed #cfe0d3;
      font-size:17px;
      color:#163c25;
      font-weight:1000;
    }

    .field{
      margin-bottom:14px;
    }

    .field label{
      font-weight:1000;
      font-size:14px;
      color:#2a3b33;
      display:block;
      margin-bottom:7px;
    }

    .field input,
    .field textarea{
      width:100%;
      max-width:100%;
      display:block;
      padding:13px 14px;
      border:1px solid #d7e2db;
      border-radius:16px;
      font-size:16px;
      background:#fff;
      color:#1f3b2d;
      outline:none;
      transition:border-color .15s ease, box-shadow .15s ease, background .15s ease;
      -webkit-appearance:none;
      appearance:none;
    }

    .field input:focus,
    .field textarea:focus{
      border-color:#9dd3b1;
      box-shadow:0 0 0 4px rgba(46,139,87,.10);
      background:#fff;
    }

    .field textarea{
      min-height:110px;
      resize:vertical;
      line-height:1.6;
    }

    .field-error{
      color:#d83a3a;
      font-size:12px;
      font-weight:1000;
      margin-top:6px;
      min-height:16px;
    }

    .btn-main{
      width:100%;
      margin-top:10px;
      background:linear-gradient(180deg, #3c8955, #2f7a49);
      color:white;
      padding:14px;
      border:none;
      border-radius:18px;
      font-weight:1000;
      cursor:pointer;
      font-size:18px;
      box-shadow:0 10px 22px rgba(47,122,73,.18);
      transition:transform .12s ease, filter .12s ease;
    }

    .btn-main:hover{
      filter:brightness(1.03);
    }

    .btn-main:active{
      transform:scale(.98);
    }

    .btn-main:disabled{
      opacity:.7;
      cursor:not-allowed;
      transform:none;
    }

    .empty-box{
      color:#6a7b72;
      font-weight:900;
      font-size:15px;
      text-align:center;
      padding:10px 4px;
    }

    @media (max-width:600px){
      .container{
        padding:14px;
      }

      .cart-box{
        padding:12px;
        border-radius:18px;
      }

      .cart-item{
        font-size:13px;
      }

      .summary-row{
        font-size:14px;
      }

      .summary-row small{
        font-size:12px;
      }

      .summary-total{
        font-size:16px;
      }

      .field label{
        font-size:13px;
      }

      .field input,
      .field textarea{
        font-size:16px;
        padding:12px 13px;
        border-radius:15px;
      }

      .btn-main{
        font-size:17px;
        padding:13px;
      }
    }
  </style>
</head>

<body>

<header>
  <span>مراجعة الطلب</span>
  <a href="/index.html" style="color:#fff; float:left; font-size:14px; text-decoration:none;">الرجوع للمتجر</a>
</header>

<div class="container">

  <div id="cartBox" class="cart-box">
    جاري تحميل السلة...
  </div>

  <form id="orderForm">

    <div class="field">
      <label>الاسم الكامل</label>
      <input type="text" id="name" required autocomplete="name">
    </div>

    <div class="field">
      <label>رقم الهاتف</label>
      <input
        type="tel"
        id="phone"
        required
        inputmode="numeric"
        autocomplete="tel"
        maxlength="10"
      >
      <div id="phoneError" class="field-error"></div>
    </div>

    <div class="field">
      <label>البلد</label>
      <input type="text" id="country" required>
    </div>

    <div class="field">
      <label>العنوان</label>
      <input type="text" id="address" required autocomplete="street-address">
    </div>

    <div class="field">
      <label>ملاحظات (اختياري)</label>
      <textarea id="notes" placeholder="مثال: الاتصال قبل الوصول، مدخل خلفي..."></textarea>
    </div>

    <button id="submitBtn" type="submit" class="btn-main">
      تأكيد الطلب
    </button>
  </form>

</div>

<script>
  let cart = {};

  const cartBox = document.getElementById('cartBox');
  const form = document.getElementById('orderForm');
  const submitBtn = document.getElementById('submitBtn');

  const elName = document.getElementById('name');
  const elPhone = document.getElementById('phone');
  const elCountry = document.getElementById('country');
  const elAddress = document.getElementById('address');
  const elNotes = document.getElementById('notes');
  const phoneError = document.getElementById('phoneError');

  const FREE_DELIVERY_FROM = 300;
  const DELIVERY_FEE = 30;

  function onlyDigits(value){
    return String(value || '').replace(/\D/g, '');
  }

  function validatePhone(showMessage = true){
    const digits = onlyDigits(elPhone.value);

    if (digits.length === 0){
      phoneError.textContent = '';
      return false;
    }

    if (digits.length < 10){
      if (showMessage) phoneError.textContent = 'رقم الهاتف ناقص';
      return false;
    }

    phoneError.textContent = '';
    return true;
  }

  elPhone.addEventListener('input', () => {
    const digits = onlyDigits(elPhone.value).slice(0, 10);
    elPhone.value = digits;
    validatePhone(true);
  });

  elPhone.addEventListener('blur', () => {
    validatePhone(true);
  });

  function calculateTotals(items){
    const subtotal = (items || []).reduce((sum, item) => {
      return sum + ((Number(item.price) || 0) * (Number(item.qty) || 0));
    }, 0);

    const delivery = subtotal >= FREE_DELIVERY_FROM ? 0 : DELIVERY_FEE;
    const grandTotal = subtotal + delivery;

    return { subtotal, delivery, grandTotal };
  }

  function loadCart(){
    const saved = localStorage.getItem('cart');

    if(!saved){
      cartBox.innerHTML = '<div class="empty-box">السلة فارغة</div>';
      return;
    }

    try{
      cart = JSON.parse(saved) || {};
    }catch(e){
      cart = {};
    }

    const items = Object.values(cart);

    if(!items.length){
      cartBox.innerHTML = '<div class="empty-box">السلة فارغة</div>';
      return;
    }

    let html = '';

    items.forEach(i=>{
      const line = (Number(i.price) || 0) * (Number(i.qty) || 0);

      html += `
        <div class="cart-item">
          <div>${i.name} (${i.qty} ${i.unitType === 'bag' ? 'كيس' : 'كغم'})</div>
          <div>₪${line}</div>
        </div>
      `;
    });

    const { subtotal, delivery, grandTotal } = calculateTotals(items);

    html += `
      <div class="cart-summary">
        <div class="summary-row">
          <small>المجموع قبل التوصيل</small>
          <span>₪${subtotal}</span>
        </div>

        <div class="summary-row">
          <small>التوصيل</small>
          <span>${delivery === 0 ? 'مجاني ✅' : '₪' + delivery}</span>
        </div>

        <div class="summary-row summary-total">
          <span>المجموع الكلي</span>
          <span>₪${grandTotal}</span>
        </div>
      </div>
    `;

    cartBox.innerHTML = html;
  }

  form.addEventListener('submit', async (e)=>{
    e.preventDefault();

    const items = Object.values(cart || {});
    if(!items.length){
      alert('السلة فارغة');
      return;
    }

    const order = {
      name: (elName.value || '').trim(),
      phone: onlyDigits(elPhone.value).slice(0, 10),
      country: (elCountry.value || '').trim(),
      address: (elAddress.value || '').trim(),
      notes: (elNotes.value || '').trim(),
      items
    };

    if(!order.name || !order.phone || !order.country || !order.address){
      alert('رجاءً عبّي كل الحقول المطلوبة');
      return;
    }

    if(order.phone.length < 10){
      phoneError.textContent = 'رقم الهاتف ناقص';
      elPhone.focus();
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'جاري الإرسال...';

    try{
      const res = await fetch('/api/orders',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(order)
      });

      const data = await res.json().catch(()=>({}));

      if(res.ok && data.success){
        localStorage.removeItem('cart');
        alert('تم إرسال الطلب بنجاح ✅');
        window.location.href = '/index.html';
      }else{
        alert(data?.error || 'حدث خطأ بإرسال الطلب');
      }
    }catch(err){
      console.error(err);
      alert('مشكلة اتصال بالسيرفر');
    }finally{
      submitBtn.disabled = false;
      submitBtn.textContent = 'تأكيد الطلب';
    }
  });

  loadCart();
</script>

</body>
</html>
