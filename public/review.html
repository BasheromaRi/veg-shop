<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مراجعة الطلب</title>
  <link rel="stylesheet" href="/styles.css">

  <style>
    *{ box-sizing:border-box; }

    body{ overflow-x:hidden; }

    .container{
      max-width:780px;
      margin:auto;
      padding:16px;
    }

    .cart-box{
      background:#fffdf8;
      border:1px solid #e7e2d6;
      border-radius:20px;
      padding:14px;
      margin-bottom:16px;
      box-shadow:0 6px 18px rgba(0,0,0,.05);
    }

    .cart-item{
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-size:14px;
      padding:8px 0;
      border-bottom:1px dashed #e7e2d6;
    }

    .cart-total{
      font-weight:1000;
      margin-top:10px;
      display:flex;
      justify-content:space-between;
      padding-top:10px;
      border-top:1px solid #efe7da;
      font-size:16px;
    }

    .field{ margin-bottom:14px; }

    .field label{
      font-weight:1000;
      font-size:14px;
      margin-bottom:6px;
      display:block;
    }

    .field input,
    .field textarea{
      width:100%;
      padding:13px 14px;
      border:1px solid #d7e2db;
      border-radius:16px;
      font-size:16px; /* يمنع الزوم */
      outline:none;
    }

    .field textarea{
      min-height:110px;
      resize:vertical;
    }

    .phone-error{
      color:#ff3b30;
      font-size:12px;
      margin-top:4px;
      font-weight:bold;
    }

    .btn-main{
      width:100%;
      margin-top:10px;
      background:#2e8b57;
      color:white;
      padding:14px;
      border:none;
      border-radius:18px;
      font-weight:1000;
      cursor:pointer;
      font-size:18px;
    }
  </style>
</head>

<body>

<header>
  <span>مراجعة الطلب</span>
  <a href="/index.html" style="color:#fff; float:left;">الرجوع للمتجر</a>
</header>

<div class="container">

  <div id="cartBox" class="cart-box">
    جاري تحميل السلة...
  </div>

  <form id="orderForm">

    <div class="field">
      <label>الاسم الكامل</label>
      <input type="text" id="name" required>
    </div>

    <div class="field">
      <label>رقم الهاتف</label>
      <input type="text" id="phone" required>
      <div id="phoneError" class="phone-error"></div>
    </div>

    <div class="field">
      <label>البلد</label>
      <input type="text" id="country" required>
    </div>

    <div class="field">
      <label>العنوان</label>
      <input type="text" id="address" required>
    </div>

    <div class="field">
      <label>ملاحظات (اختياري)</label>
      <textarea id="notes"></textarea>
    </div>

    <button id="submitBtn" type="submit" class="btn-main">
      تأكيد الطلب
    </button>
  </form>

</div>

<script>
let cart = {};

const cartBox = document.getElementById('cartBox');
const form = document.getElementById('orderForm');
const submitBtn = document.getElementById('submitBtn');

const elName = document.getElementById('name');
const elPhone = document.getElementById('phone');
const elCountry = document.getElementById('country');
const elAddress = document.getElementById('address');
const elNotes = document.getElementById('notes');

const phoneError = document.getElementById('phoneError');

/* ===== تحقق مباشر ===== */
elPhone.addEventListener('input', () => {
  const digits = elPhone.value.replace(/\D/g, '');

  if (digits.length > 0 && digits.length < 10) {
    phoneError.textContent = 'رقم الهاتف ناقص';
  } else {
    phoneError.textContent = '';
  }
});

function loadCart(){
  const saved = localStorage.getItem('cart');

  if(!saved){
    cartBox.innerHTML = 'السلة فارغة';
    return;
  }

  try{
    cart = JSON.parse(saved) || {};
  }catch(e){
    cart = {};
  }

  const items = Object.values(cart);

  if(!items.length){
    cartBox.innerHTML = 'السلة فارغة';
    return;
  }

  let html = '';
  let total = 0;

  items.forEach(i=>{
    const line = (Number(i.price)||0) * (Number(i.qty)||0);
    total += line;

    html += `
      <div class="cart-item">
        <div>${i.name} (${i.qty})</div>
        <div>₪${line}</div>
      </div>
    `;
  });

  html += `
    <div class="cart-total">
      <span>المجموع</span>
      <span>₪${total}</span>
    </div>
  `;

  cartBox.innerHTML = html;
}

/* ===== إرسال الطلب ===== */
form.addEventListener('submit', async (e)=>{
  e.preventDefault();

  const items = Object.values(cart || {});
  if(!items.length){
    alert('السلة فارغة');
    return;
  }

  const phoneDigits = elPhone.value.replace(/\D/g, '');

  if(phoneDigits.length < 10){
    phoneError.textContent = 'رقم الهاتف ناقص';
    alert('رقم الهاتف ناقص');
    return;
  }

  const order = {
    name: elName.value.trim(),
    phone: elPhone.value.trim(),
    country: elCountry.value.trim(),
    address: elAddress.value.trim(),
    notes: elNotes.value.trim(),
    items
  };

  if(!order.name || !order.country || !order.address){
    alert('رجاءً عبّي كل الحقول المطلوبة');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'جاري الإرسال...';

  try{
    const res = await fetch('/api/orders',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(order)
    });

    const data = await res.json().catch(()=>({}));

    if(res.ok && data.success){
      localStorage.removeItem('cart');
      alert('تم إرسال الطلب بنجاح ✅');
      window.location.href = '/index.html';
    }else{
      alert('حدث خطأ');
    }
  }catch(err){
    alert('مشكلة اتصال');
  }

  submitBtn.disabled = false;
  submitBtn.textContent = 'تأكيد الطلب';
});

loadCart();
</script>

</body>
</html>
