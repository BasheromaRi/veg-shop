<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>خَيْرَات صَنْدَلَه 💚</title>
  <link rel="stylesheet" href="/styles.css">

  <style>
    /* زر سلة عائم مرتب */
    .fab-cart{
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 9999;
      display:flex;
      align-items:center;
      gap:10px;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 999px;
      background: #2e8b57;
      color: #fff;
      font-weight: 1000;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0,0,0,.18);
    }
    .fab-cart:active{ transform: scale(.98); }
    .fab-cart #cartCount{
      min-width: 22px;
      height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      display:flex;
      align-items:center;
      justify-content:center;
      background: rgba(255,255,255,.22);
      font-weight: 1000;
      font-size: 12px;
    }

    .card h3{ margin: 6px 0 4px; }
    .card .desc{ font-size:13px; color:#555; margin-bottom:6px; line-height:1.4; }
    .card .price{ font-weight:1000; margin-bottom:10px; }

    /* ===== العروض ===== */
    .campaign-banner{
      background:#fdf3e7;
      border:1px solid #f5c78b;
      border-radius:14px;
      padding:12px 14px;
      margin: 14px 0 18px;
    }
    .campaign-banner h3{
      margin:0 0 8px;
      font-size:16px;
      color:#c26b12;
      font-weight:1000;
    }
    .campaign-item{
      background:#fffaf2;
      border:1px dashed #f0b168;
      border-radius:12px;
      padding:10px 10px;
      margin-bottom:10px;
    }
    .campaign-title{ font-weight:1000; margin-bottom:4px; }
    .campaign-desc{ font-size:13px; color:#444; line-height:1.5; }
    .campaign-extra{ font-size:12px; color:#6a4b20; margin-top:4px; font-weight:900; }

    .bottom-space{ height: 110px; }

    /* ===== تواصل معنا ===== */
    .contact-card{
      margin: 18px 0 10px;
      background:#fff;
      border:1px solid #dfe7e2;
      border-radius:16px;
      padding:14px;
      box-shadow:0 1px 10px rgba(0,0,0,.06);
      text-align:center;
    }
    .contact-head h3{
      margin:0;
      font-size:16px;
      font-weight:1000;
      color:#0f2b1f;
    }
    .contact-head p{
      margin:6px 0 0;
      font-size:12px;
      color:#6a7b72;
      font-weight:900;
    }

    .contact-icons{
      margin-top:12px;
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }
    .cicon{
      width:52px;
      height:52px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid #dfe7e2;
      background:#fff;
      box-shadow:0 6px 16px rgba(0,0,0,.08);
      transition: transform .1s, box-shadow .1s;
    }
    .cicon:active{ transform: scale(.97); }
    .cicon img{ width:26px; height:26px; display:block; }

    .cicon.wa{ background:#eafff2; border-color:#bdebd0; }
    .cicon.ig{ background:#fff0fb; border-color:#f3c1e7; }
    .cicon.fb{ background:#eef6ff; border-color:#b9d7ff; }

    .contact-phone-pill{
      margin-top:12px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      border-radius:999px;
      padding:10px 12px;
      background:#f6fbf8;
      border:1px solid #cfe3d6;
      font-weight:1000;
      color:#0f2b1f;
    }
    .contact-phone-pill a{
      color:#2e8b57;
      text-decoration:none;
      font-weight:1000;
      direction:ltr;
    }

    /* ===== Modal ===== */
    .modal-backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.38);
      z-index:10000;
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
    }
    .modal-backdrop.show{
      display:flex;
    }

    .qty-modal{
      width:100%;
      max-width:430px;
      background:#fff;
      border-radius:24px;
      box-shadow:0 20px 50px rgba(0,0,0,.22);
      overflow:hidden;
      animation: popIn .18s ease;
    }

    @keyframes popIn{
      from{ opacity:0; transform: translateY(10px) scale(.98); }
      to{ opacity:1; transform: translateY(0) scale(1); }
    }

    .qty-modal-head{
      padding:16px 18px 12px;
      border-bottom:1px solid #eef2ef;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }

    .qty-modal-title{
      font-size:20px;
      font-weight:1000;
      color:#0f2b1f;
      margin:0 0 4px;
    }

    .qty-modal-sub{
      font-size:13px;
      color:#6a7b72;
      font-weight:900;
      margin:0;
    }

    .modal-close{
      width:40px;
      height:40px;
      border:none;
      border-radius:999px;
      background:#f2f6f3;
      cursor:pointer;
      font-size:22px;
      font-weight:1000;
      color:#375546;
    }

    .qty-modal-body{
      padding:16px 18px 18px;
      display:grid;
      gap:14px;
    }

    .modal-price-box{
      background:#f6fbf8;
      border:1px solid #dbe9e0;
      border-radius:16px;
      padding:12px;
      text-align:center;
    }
    .modal-price{
      font-size:22px;
      font-weight:1000;
      color:#123224;
    }
    .modal-unit{
      margin-top:4px;
      font-size:13px;
      color:#6a7b72;
      font-weight:900;
    }

    .modal-label{
      font-weight:1000;
      color:#173527;
      font-size:14px;
      margin-bottom:6px;
    }

    .modal-select,
    .modal-input{
      width:100%;
      box-sizing:border-box;
      padding:13px 14px;
      border-radius:14px;
      border:1px solid #d7e2db;
      background:#fff;
      font-size:16px;
      font-weight:1000;
      outline:none;
    }

    .modal-input{
      text-align:center;
      direction:ltr;
    }

    .modal-select:focus,
    .modal-input:focus{
      border-color:#9dd3b1;
      box-shadow:0 0 0 4px rgba(46,139,87,.10);
    }

    .modal-hint{
      margin-top:-4px;
      font-size:12px;
      color:#6a7b72;
      line-height:1.5;
      font-weight:900;
      text-align:center;
    }

    .modal-actions{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }

    .btn-soft{
      border:none;
      border-radius:14px;
      padding:13px 14px;
      font-weight:1000;
      font-size:15px;
      cursor:pointer;
    }

    .btn-yellow{
      background:#f7c948;
      color:#3c2b00;
      box-shadow:0 8px 18px rgba(247,201,72,.28);
    }
    .btn-yellow:active{ transform:scale(.98); }

    .btn-light{
      background:#eef4f0;
      color:#274435;
    }

    @media (max-width:520px){
      .modal-actions{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body style="text-align:right;">
<header>
  <span>خَيْرَات صَنْدَلَه 💚</span>
</header>

<button class="fab-cart" onclick="goToCart()" aria-label="سلة المشتريات">
  🛒 <span id="cartCount">0</span>
</button>

<div class="container">

  <div id="campaignBanner" class="campaign-banner" style="display:none;">
    <h3>العروض الحالية</h3>
    <div id="campaignContent"></div>
  </div>

  <h2>منتجاتنا</h2>
  <div id="productsContainer">جاري تحميل المنتجات...</div>

  <section class="contact-card" aria-label="تواصل معنا">
    <div class="contact-head">
      <h3>تواصل معنا</h3>
      <p>نرد بسرعة على واتساب 💚</p>
    </div>

    <div class="contact-icons">
      <a class="cicon wa" href="https://wa.me/972507979314" target="_blank" rel="noopener" aria-label="WhatsApp">
        <img src="/images/whatsapp.svg" alt="WhatsApp">
      </a>

      <a class="cicon ig" href="https://www.instagram.com/sandala_mlokhea" target="_blank" rel="noopener" aria-label="Instagram">
        <img src="/images/instagram.svg" alt="Instagram">
      </a>

      <a class="cicon fb" href="https://www.facebook.com/share/1WtoUbnS8W/?mibextid=wwXIfr" target="_blank" rel="noopener" aria-label="Facebook">
        <img src="/images/facebook.svg" alt="Facebook">
      </a>
    </div>

    <div class="contact-phone-pill">
      <span>📞</span>
      <span>الهاتف</span>
      <a href="tel:0507979314">0507979314</a>
    </div>
  </section>

  <div class="bottom-space"></div>
</div>

<!-- نافذة اختيار الكمية -->
<div id="qtyModalBackdrop" class="modal-backdrop" onclick="backdropClose(event)">
  <div class="qty-modal" role="dialog" aria-modal="true" aria-labelledby="modalProductName">
    <div class="qty-modal-head">
      <div>
        <h3 id="modalProductName" class="qty-modal-title">اسم المنتج</h3>
        <p id="modalProductDesc" class="qty-modal-sub"></p>
      </div>
      <button class="modal-close" type="button" onclick="closeQtyModal()">×</button>
    </div>

    <div class="qty-modal-body">
      <div class="modal-price-box">
        <div id="modalPrice" class="modal-price">₪0</div>
        <div id="modalUnit" class="modal-unit">كغم</div>
      </div>

      <div>
        <div class="modal-label">اختار الكمية</div>
        <select id="modalQtySelect" class="modal-select"></select>
      </div>

      <div>
        <div class="modal-label">أو اكتب الكمية</div>
        <input
          id="modalQtyInput"
          type="text"
          inputmode="numeric"
          pattern="[0-9]*"
          class="modal-input"
          placeholder="مثال: 25"
        />
      </div>

      <div id="modalHint" class="modal-hint"></div>

      <div class="modal-actions">
        <button class="btn-soft btn-light" type="button" onclick="closeQtyModal()">إلغاء</button>
        <button class="btn-soft btn-yellow" type="button" onclick="confirmAddToCart()">أضف للسلة</button>
      </div>
    </div>
  </div>
</div>

<script>
let products = [];
let cart = {};
let activeProduct = null;

function unitLabel(u){ return (u === 'bag') ? 'كيس' : 'كغم'; }

function isStepFiveProduct(p){
  const n = String(p?.name || '');
  return n.includes('عروق') || n.includes('عيدان') || n.includes('عِيدان');
}

function escHtml(s){
  return String(s ?? '').replace(/[&<>"']/g, (m) => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[m]));
}

function buildModalSelectOptions(p, currentQty){
  let opts = [];
  const step5 = (isStepFiveProduct(p) && p.unitType !== 'bag');

  if (step5) {
    opts = [0,5,10,15,20];
  } else {
    opts = Array.from({length:21}, (_,i)=>i);
  }

  return opts.map(v => {
    const selected = Number(currentQty) === v ? 'selected' : '';
    return `<option value="${v}" ${selected}>${v}</option>`;
  }).join('');
}

async function loadCampaigns(){
  const banner = document.getElementById('campaignBanner');
  const content = document.getElementById('campaignContent');
  if (!banner || !content) return;

  try{
    const res = await fetch('/api/campaigns/active', { cache:'no-store' });
    const data = await res.json().catch(()=>null);

    if (!res.ok || !Array.isArray(data) || data.length === 0){
      banner.style.display = 'none';
      content.innerHTML = '';
      return;
    }

    banner.style.display = 'block';
    content.innerHTML = data.map(c => {
      const desc = (c.description || '').trim();
      const dp = (c.discountPercent ?? '');
      const mt = (c.minTotal ?? '');
      return `
        <div class="campaign-item">
          <div class="campaign-title">${escHtml(c.title || '')}</div>
          ${desc ? `<div class="campaign-desc">${escHtml(desc)}</div>` : ''}
          ${(dp !== '' && dp != null) ? `<div class="campaign-extra">خصم: ${dp}%</div>` : ''}
          ${(mt !== '' && mt != null) ? `<div class="campaign-extra">الحد الأدنى للطلب: ₪${mt}</div>` : ''}
        </div>
      `;
    }).join('');
  }catch(e){
    console.error('loadCampaigns error:', e);
    banner.style.display = 'none';
    content.innerHTML = '';
  }
}

async function loadProducts() {
  await loadCampaigns();

  const res = await fetch('/api/products', { cache:'no-store' });
  products = await res.json();
  loadCartFromStorage();
  renderProducts();
}

function renderProducts() {
  const container = document.getElementById('productsContainer');
  container.innerHTML = '';

  products.forEach(p => {
    if (!p.available) return;

    const u = unitLabel(p.unitType);
    const qty = Number(cart[p.id]?.qty || 0);
    const imageUrl = (p.images && p.images.length) ? p.images[0] : '/images/no-image.png';

    const card = document.createElement('div');
    card.className = 'card';
    card.style.cursor = 'pointer';
    card.onclick = () => openQtyModal(p.id);

    card.innerHTML = `
      <img src="${imageUrl}" alt="${escHtml(p.name)}"
        style="width:100%;height:160px;object-fit:cover;border-radius:10px;margin-bottom:8px;">

      <h3>${escHtml(p.name)}</h3>
      <div class="desc">${escHtml(p.description || '')}</div>
      <div class="price">₪${p.price} / ${u}</div>

      <button
        type="button"
        class="store-add-btn"
        onclick="event.stopPropagation(); openQtyModal(${p.id})"
      >
        أضف للسلة
      </button>

      ${qty > 0 ? `<div class="in-cart-note">بالسلة: ${qty} ${u}</div>` : ''}
    `;

    container.appendChild(card);
  });

  if (!container.innerHTML.trim()) {
    container.innerHTML = 'لا يوجد منتجات متاحة حالياً.';
  }
}

function openQtyModal(productId){
  const p = products.find(x => x.id === productId);
  if (!p) return;

  activeProduct = p;

  const currentQty = Number(cart[p.id]?.qty || 0);
  const u = unitLabel(p.unitType);
  const step5 = (isStepFiveProduct(p) && p.unitType !== 'bag');

  document.getElementById('modalProductName').textContent = p.name;
  document.getElementById('modalProductDesc').textContent = p.description || '';
  document.getElementById('modalPrice').textContent = `₪${p.price}`;
  document.getElementById('modalUnit').textContent = u;

  const sel = document.getElementById('modalQtySelect');
  sel.innerHTML = buildModalSelectOptions(p, currentQty <= 20 ? currentQty : 0);

  const input = document.getElementById('modalQtyInput');
  input.value = currentQty > 20 ? currentQty : '';

  document.getElementById('modalHint').textContent = step5
    ? 'ملوخية العيدان: لازم الكمية تكون مضاعفات 5 مثل 5، 10، 15...'
    : 'تقدر تختار من القائمة أو تكتب أي كمية أكبر من 20.';

  document.getElementById('qtyModalBackdrop').classList.add('show');

  setTimeout(() => {
    if (input.value) input.focus();
  }, 50);
}

function closeQtyModal(){
  document.getElementById('qtyModalBackdrop').classList.remove('show');
  activeProduct = null;
}

function backdropClose(e){
  if (e.target.id === 'qtyModalBackdrop') {
    closeQtyModal();
  }
}

function confirmAddToCart(){
  if (!activeProduct) return;

  const p = activeProduct;
  const selVal = Number(document.getElementById('modalQtySelect').value || 0);
  const rawInput = document.getElementById('modalQtyInput').value || '';
  const digits = String(rawInput).replace(/[^\d]/g, '');
  let qty = digits ? Number(digits) : selVal;

  if (!qty || qty < 0) qty = 0;

  if (qty > 9999){
    alert('الكمية كبيرة جداً');
    return;
  }

  const step5 = (isStepFiveProduct(p) && p.unitType !== 'bag');
  if (step5 && qty !== 0 && (qty % 5 !== 0)){
    alert('ملوخية العيدان: لازم الكمية تكون مضاعفات 5 (5، 10، 15...)');
    return;
  }

  if (qty === 0){
    delete cart[p.id];
  } else {
    cart[p.id] = {
      id: p.id,
      name: p.name,
      price: p.price,
      unitType: p.unitType,
      qty
    };
  }

  saveCart();
  closeQtyModal();
  renderProducts();
}

function saveCart() {
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
}

function loadCartFromStorage() {
  const saved = localStorage.getItem('cart');
  if (saved) {
    try { cart = JSON.parse(saved) || {}; } catch { cart = {}; }
  }
  updateCartCount();
}

function updateCartCount() {
  const total = Object.values(cart).reduce((s,i)=>s + (Number(i.qty)||0), 0);
  const el = document.getElementById('cartCount');
  if (el) el.textContent = total;
}

function goToCart() {
  window.location.href = '/review.html';
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeQtyModal();
});

document.addEventListener('DOMContentLoaded', loadProducts);
</script>

</body>
</html>
