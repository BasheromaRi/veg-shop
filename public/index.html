<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>خَيْرَات صَنْدَلَه 💚</title>
  <button onclick="toggleMenu()" class="menu-btn">☰</button>
  <link rel="stylesheet" href="/styles.css">
<div id="sideMenu" class="side-menu">
  <div class="menu-header">
    خيرات صندله 💚
  </div>

  <a href="/index.html">🏠 الرئيسية</a>
  <a href="#campaignBanner">🔥 العروض</a>
  <a href="/review.html">🛒 سلة المشتريات</a>
  <a href="#">📦 سياسة التوصيل</a>
  <a href="#">📞 تواصل معنا</a>
  <a href="#">ℹ️ من نحن</a>
</div>

<div id="menuOverlay" class="menu-overlay" onclick="toggleMenu()"></div>
  <style>
    /* زر سلة عائم أوضح */
    .fab-cart{
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 9999;
      display:flex;
      align-items:center;
      gap:10px;
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 999px;
      background: linear-gradient(180deg, #ff9f1c, #ff7a00) !important;
      color: #fff;
      font-weight: 1000;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(255,122,0,.28) !important;
      transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
    }
    .fab-cart:hover{
      transform: translateY(-1px);
      filter: brightness(1.03);
    }
    .fab-cart:active{ transform: scale(.97); }
    .fab-cart.bump{ animation: cartBump .32s ease; }

    @keyframes cartBump{
      0%{ transform: scale(1); }
      40%{ transform: scale(1.10); }
      100%{ transform: scale(1); }
    }

    .fab-cart .cart-label{
      font-size:14px;
      font-weight:1000;
      white-space:nowrap;
    }

    /* السعر */
    #cartTotal{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:58px;
      height:28px;
      padding:0 10px;
      border-radius:999px;
      background:rgba(255,255,255,.18);
      font-size:13px;
      font-weight:1000;
      line-height:1;
      direction:ltr;
    }

    /* العداد الأحمر */
    .cart-badge{
      position:absolute;
      top:-8px;
      right:-10px;
      min-width:22px;
      height:22px;
      padding:0 6px;
      border-radius:999px;
      background:#ff3b30;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      font-weight:1000;
      line-height:1;
      box-shadow:0 4px 10px rgba(0,0,0,.25);
      border:2px solid #fff4e8;
      z-index:2;
    }

    .card h3{ margin: 8px 0 6px; }
    .card .desc{ font-size:13px; color:#666; margin-bottom:8px; line-height:1.5; min-height:20px; }
    .card .price{ font-weight:1000; margin-bottom:12px; }

    /* ===== شارة عليه حملة ===== */
    .product-image-wrap{
      position:relative;
      width:100%;
      margin-bottom:10px;
    }

    .campaign-corner-badge{
      position:absolute;
      top:10px;
      left:-6px;
      z-index:2;
      background:linear-gradient(180deg, #ff4d4d, #d91f1f);
      color:#fff;
      font-size:12px;
      font-weight:1000;
      padding:7px 12px 7px 14px;
      border-radius:0 10px 10px 0;
      box-shadow:0 8px 18px rgba(217,31,31,.28);
      line-height:1;
      white-space:nowrap;
    }

    .campaign-corner-badge::after{
      content:"";
      position:absolute;
      left:0;
      bottom:-6px;
      width:0;
      height:0;
      border-top:6px solid #8f1111;
      border-left:6px solid transparent;
    }

    /* ===== العروض ===== */
    .campaign-banner{
      background:#f8f1df;
      border:1px solid #e8d2a1;
      border-radius:18px;
      padding:14px 16px;
      margin: 16px 0 20px;
    }
    .campaign-banner h3{
      margin:0 0 8px;
      font-size:17px;
      color:#b2781d;
      font-weight:1000;
    }
    .campaign-item{
      background:#fcf8ee;
      border:1px dashed #e3c182;
      border-radius:14px;
      padding:10px 12px;
      margin-bottom:10px;
    }
    .campaign-title{ font-weight:1000; margin-bottom:4px; color:#5f4310; }
    .campaign-desc{ font-size:13px; color:#555; line-height:1.5; }
    .campaign-extra{ font-size:12px; color:#7d6535; margin-top:4px; font-weight:900; }

    .bottom-space{ height: 110px; }

    /* ===== تواصل معنا ===== */
    .contact-card{
      margin: 18px 0 10px;
      background:#fffdf8;
      border:1px solid #e7e2d6;
      border-radius:20px;
      padding:16px;
      box-shadow:0 8px 20px rgba(0,0,0,.05);
      text-align:center;
    }
    .contact-head h3{
      margin:0;
      font-size:17px;
      font-weight:1000;
      color:#163c25;
    }

    .contact-icons{
      margin-top:12px;
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }
    .cicon{
      width:54px;
      height:54px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid #e3e3e3;
      background:#fff;
      box-shadow:0 6px 16px rgba(0,0,0,.06);
      transition: transform .12s ease, box-shadow .12s ease;
    }
    .cicon:hover{ transform: translateY(-1px); }
    .cicon:active{ transform: scale(.97); }
    .cicon img{ width:26px; height:26px; display:block; }

    .cicon.wa{ background:#eafff2; border-color:#bdebd0; }
    .cicon.ig{ background:#fff0fb; border-color:#f3c1e7; }
    .cicon.fb{ background:#eef6ff; border-color:#b9d7ff; }

    .contact-phone-pill{
      margin-top:14px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      border-radius:999px;
      padding:10px 14px;
      background:#f4f8f3;
      border:1px solid #d7dfd4;
      font-weight:1000;
      color:#163c25;
    }
    .contact-phone-pill a{
      color:#3c8955;
      text-decoration:none;
      font-weight:1000;
      direction:ltr;
    }

    /* ===== نافذة اختيار الكمية ===== */
    .modal-backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.40);
      z-index:10000;
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      backdrop-filter: blur(2px);
    }
    .modal-backdrop.show{
      display:flex;
    }

    .qty-modal{
      width:100%;
      max-width:430px;
      background:#fffdf8;
      border-radius:24px;
      box-shadow:0 22px 60px rgba(0,0,0,.24);
      overflow:hidden;
      animation: popIn .18s ease;
      border:1px solid #ebe4d6;
    }

    @keyframes popIn{
      from{ opacity:0; transform: translateY(10px) scale(.98); }
      to{ opacity:1; transform: translateY(0) scale(1); }
    }

    .qty-modal-head{
      padding:16px 18px 12px;
      border-bottom:1px solid #efe7da;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }

    .qty-modal-title{
      font-size:20px;
      font-weight:1000;
      color:#163c25;
      margin:0 0 4px;
    }

    .qty-modal-sub{
      font-size:13px;
      color:#6a7b72;
      font-weight:900;
      margin:0;
      line-height:1.5;
    }

    .modal-close{
      width:40px;
      height:40px;
      border:none;
      border-radius:999px;
      background:#f3f6f3;
      cursor:pointer;
      font-size:22px;
      font-weight:1000;
      color:#375546;
    }

    .qty-modal-body{
      padding:16px 18px 18px;
      display:grid;
      gap:14px;
    }

    .modal-price-box{
      background:#f4f8f3;
      border:1px solid #dbe9e0;
      border-radius:16px;
      padding:12px;
      text-align:center;
    }
    .modal-price{
      font-size:22px;
      font-weight:1000;
      color:#123224;
    }
    .modal-unit{
      margin-top:4px;
      font-size:13px;
      color:#6a7b72;
      font-weight:900;
    }

    .modal-label{
      font-weight:1000;
      color:#173527;
      font-size:14px;
      margin-bottom:6px;
    }

    .modal-select,
    .modal-input{
      width:100%;
      box-sizing:border-box;
      padding:13px 14px;
      border-radius:14px;
      border:1px solid #d7e2db;
      background:#fff;
      font-size:16px;
      font-weight:1000;
      outline:none;
    }

    .modal-input{
      text-align:center;
      direction:ltr;
    }

    .modal-select:focus,
    .modal-input:focus{
      border-color:#9dd3b1;
      box-shadow:0 0 0 4px rgba(46,139,87,.10);
    }

    .modal-hint{
      margin-top:-4px;
      font-size:12px;
      color:#6a7b72;
      line-height:1.5;
      font-weight:900;
      text-align:center;
    }

    .modal-actions{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }

    .btn-soft{
      border:none;
      border-radius:14px;
      padding:13px 14px;
      font-weight:1000;
      font-size:15px;
      cursor:pointer;
      transition: transform .12s ease, filter .12s ease;
    }
    .btn-soft:active{ transform:scale(.98); }

    .btn-yellow{
      background:linear-gradient(180deg, #f5df52, #efd540);
      color:#3c2b00;
      box-shadow:0 8px 18px rgba(247,201,72,.28);
    }

    .btn-light{
      background:#eef4f0;
      color:#274435;
    }

    /* حركة زر الإضافة */
    .store-add-btn.added{
      animation: addPop .25s ease;
    }
    @keyframes addPop{
      0%{ transform:scale(1); }
      50%{ transform:scale(1.08); }
      100%{ transform:scale(1); }
    }

    @media (max-width:520px){
      .modal-actions{
        grid-template-columns:1fr;
      }
      .fab-cart{
        right:12px;
        bottom:12px;
        padding:11px 14px;
        gap:8px;
      }
      .fab-cart .cart-label{
        font-size:13px;
      }
      #cartTotal{
        min-width:52px;
        height:26px;
        padding:0 8px;
        font-size:12px;
      }
      .cart-badge{
        top:-7px;
        right:-8px;
        min-width:20px;
        height:20px;
        font-size:10px;
      }
      .campaign-corner-badge{
        font-size:11px;
        padding:6px 10px 6px 12px;
        top:8px;
        left:-5px;
      }
    }
  </style>
</head>

<body style="text-align:right;">
<header>
  <span>خَيْرَات صَنْدَلَه 💚</span>
</header>

<button class="fab-cart" onclick="goToCart()">
  🛒
  <span class="cart-label">سلة المشتريات</span>
  <span id="cartTotal">₪0</span>
  <span id="cartCount" class="cart-badge">0</span>
</button>

<div class="container">

  <div id="campaignBanner" class="campaign-banner" style="display:none;">
    <h3>العروض الحالية</h3>
    <div id="campaignContent"></div>
  </div>

  <h2>منتجاتنا</h2>
  <div id="productsContainer">جاري تحميل المنتجات...</div>

  <section class="contact-card" aria-label="تواصل معنا">
    <div class="contact-head">
      <h3>تواصل معنا 💚</h3>
    </div>

    <div class="contact-icons">
      <a class="cicon wa" href="https://wa.me/972507979314" target="_blank" rel="noopener" aria-label="WhatsApp">
        <img src="/images/whatsapp.svg" alt="WhatsApp">
      </a>

      <a class="cicon ig" href="https://www.instagram.com/sandala_mlokhea" target="_blank" rel="noopener" aria-label="Instagram">
        <img src="/images/instagram.svg" alt="Instagram">
      </a>

      <a class="cicon fb" href="https://www.facebook.com/share/1WtoUbnS8W/?mibextid=wwXIfr" target="_blank" rel="noopener" aria-label="Facebook">
        <img src="/images/facebook.svg" alt="Facebook">
      </a>
    </div>

    <div class="contact-phone-pill">
      <span>📞</span>
      <span>الهاتف</span>
      <a href="tel:0507979314">0507979314</a>
    </div>
  </section>

  <div class="bottom-space"></div>
</div>

<!-- نافذة اختيار الكمية -->
<div id="qtyModalBackdrop" class="modal-backdrop" onclick="backdropClose(event)">
  <div class="qty-modal" role="dialog" aria-modal="true" aria-labelledby="modalProductName">
    <div class="qty-modal-head">
      <div>
        <h3 id="modalProductName" class="qty-modal-title">اسم المنتج</h3>
        <p id="modalProductDesc" class="qty-modal-sub"></p>
      </div>
      <button class="modal-close" type="button" onclick="closeQtyModal()">×</button>
    </div>

    <div class="qty-modal-body">
      <div class="modal-price-box">
        <div id="modalPrice" class="modal-price">₪0</div>
        <div id="modalUnit" class="modal-unit">كغم</div>
      </div>

      <div>
        <div class="modal-label">اختار الكمية</div>
        <select id="modalQtySelect" class="modal-select"></select>
      </div>

      <div>
        <div class="modal-label">أو اكتب الكمية</div>
        <input
          id="modalQtyInput"
          type="text"
          inputmode="numeric"
          pattern="[0-9]*"
          class="modal-input"
          placeholder="مثال: 25"
        />
      </div>

      <div id="modalHint" class="modal-hint"></div>

      <div class="modal-actions">
        <button class="btn-soft btn-light" type="button" onclick="closeQtyModal()">إلغاء</button>
        <button class="btn-soft btn-yellow" type="button" onclick="confirmAddToCart()">أضف للسلة</button>
      </div>
    </div>
  </div>
</div>

<script>
let products = [];
let cart = {};
let activeProduct = null;
let activeButton = null;

function unitLabel(u){ return (u === 'bag') ? 'كيس' : 'كغم'; }

function isStepFiveProduct(p){
  const n = String(p?.name || '');
  return n.includes('عروق') || n.includes('عيدان') || n.includes('عِيدان');
}

function hasProductCampaign(p){
  return !!(p?.onCampaign || p?.hasCampaign || p?.campaignActive);
}

function escHtml(s){
  return String(s ?? '').replace(/[&<>"']/g, (m) => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[m]));
}

function buildModalSelectOptions(p, currentQty){
  let opts = [];
  const step5 = (isStepFiveProduct(p) && p.unitType !== 'bag');

  if (step5) {
    opts = [0,5,10,15,20];
  } else {
    opts = Array.from({length:21}, (_,i)=>i);
  }

  return opts.map(v => {
    const selected = Number(currentQty) === v ? 'selected' : '';
    return `<option value="${v}" ${selected}>${v}</option>`;
  }).join('');
}

async function loadCampaigns(){
  const banner = document.getElementById('campaignBanner');
  const content = document.getElementById('campaignContent');
  if (!banner || !content) return;

  try{
    const res = await fetch('/api/campaigns/active', { cache:'no-store' });
    const data = await res.json().catch(()=>null);

    if (!res.ok || !Array.isArray(data) || data.length === 0){
      banner.style.display = 'none';
      content.innerHTML = '';
      return;
    }

    banner.style.display = 'block';
    content.innerHTML = data.map(c => {
      const desc = (c.description || '').trim();
      const dp = (c.discountPercent ?? '');
      const mt = (c.minTotal ?? '');
      return `
        <div class="campaign-item">
          <div class="campaign-title">${escHtml(c.title || '')}</div>
          ${desc ? `<div class="campaign-desc">${escHtml(desc)}</div>` : ''}
          ${(dp !== '' && dp != null) ? `<div class="campaign-extra">خصم: ${dp}%</div>` : ''}
          ${(mt !== '' && mt != null) ? `<div class="campaign-extra">الحد الأدنى للطلب: ₪${mt}</div>` : ''}
        </div>
      `;
    }).join('');
  }catch(e){
    console.error('loadCampaigns error:', e);
    banner.style.display = 'none';
    content.innerHTML = '';
  }
}

async function loadProducts() {
  await loadCampaigns();

  const res = await fetch('/api/products', { cache:'no-store' });
  products = await res.json();
  loadCartFromStorage();
  renderProducts();
}

function renderProducts() {
  const container = document.getElementById('productsContainer');
  container.innerHTML = '';

  products.forEach(p => {
    if (!p.available) return;

    const u = unitLabel(p.unitType);
    const qty = Number(cart[p.id]?.qty || 0);
    const imageUrl = (p.images && p.images.length) ? p.images[0] : '/images/no-image.png';
    const showCampaignBadge = hasProductCampaign(p);

    const card = document.createElement('div');
    card.className = 'card';
    card.style.cursor = 'pointer';
    card.onclick = () => openQtyModal(p.id, null);

    card.innerHTML = `
      <div class="product-image-wrap">
        ${showCampaignBadge ? `<span class="campaign-corner-badge">حملة</span>` : ''}
        <img src="${imageUrl}" alt="${escHtml(p.name)}"
          style="width:100%;height:160px;object-fit:cover;border-radius:14px;margin-bottom:10px;">
      </div>

      <h3>${escHtml(p.name)}</h3>
      <div class="desc">${escHtml(p.description || '')}</div>
      <div class="price">₪${p.price} / ${u}</div>

      <button
        type="button"
        class="store-add-btn"
        onclick="event.stopPropagation(); openQtyModal(${p.id}, this)"
      >
        أضف للسلة
      </button>

      ${qty > 0 ? `<div class="in-cart-note">بالسلة: ${qty} ${u}</div>` : ''}
    `;

    container.appendChild(card);
  });

  if (!container.innerHTML.trim()) {
    container.innerHTML = 'لا يوجد منتجات متاحة حالياً.';
  }
}

function openQtyModal(productId, btn){
  const p = products.find(x => x.id === productId);
  if (!p) return;

  activeProduct = p;
  activeButton = btn || null;

  const currentQty = Number(cart[p.id]?.qty || 0);
  const u = unitLabel(p.unitType);
  const step5 = (isStepFiveProduct(p) && p.unitType !== 'bag');

  document.getElementById('modalProductName').textContent = p.name;
  document.getElementById('modalProductDesc').textContent = p.description || '';
  document.getElementById('modalPrice').textContent = `₪${p.price}`;
  document.getElementById('modalUnit').textContent = u;

  const sel = document.getElementById('modalQtySelect');
  sel.innerHTML = buildModalSelectOptions(p, currentQty <= 20 ? currentQty : 0);

  const input = document.getElementById('modalQtyInput');
  input.value = currentQty > 20 ? currentQty : '';

  document.getElementById('modalHint').textContent = step5
    ? 'ملوخية العيدان: لازم الكمية تكون مضاعفات 5 مثل 5، 10، 15...'
    : 'تقدر تختار من القائمة أو تكتب أي كمية أكبر من 20.';

  document.getElementById('qtyModalBackdrop').classList.add('show');

  setTimeout(() => {
    input.focus();
  }, 50);
}

function closeQtyModal(){
  document.getElementById('qtyModalBackdrop').classList.remove('show');
  activeProduct = null;
  activeButton = null;
}

function backdropClose(e){
  if (e.target.id === 'qtyModalBackdrop') {
    closeQtyModal();
  }
}

function animateAdd(){
  if (activeButton){
    activeButton.classList.remove('added');
    void activeButton.offsetWidth;
    activeButton.classList.add('added');
    setTimeout(() => activeButton && activeButton.classList.remove('added'), 260);
  }

  const cartBtn = document.querySelector('.fab-cart');
  if (cartBtn){
    cartBtn.classList.remove('bump');
    void cartBtn.offsetWidth;
    cartBtn.classList.add('bump');
    setTimeout(() => cartBtn.classList.remove('bump'), 340);
  }
}

function confirmAddToCart(){
  if (!activeProduct) return;

  const p = activeProduct;
  const selVal = Number(document.getElementById('modalQtySelect').value || 0);
  const rawInput = document.getElementById('modalQtyInput').value || '';
  const digits = String(rawInput).replace(/[^\d]/g, '');
  let qty = digits ? Number(digits) : selVal;

  if (!qty || qty < 0) qty = 0;

  if (qty > 9999){
    alert('الكمية كبيرة جداً');
    return;
  }

  const step5 = (isStepFiveProduct(p) && p.unitType !== 'bag');
  if (step5 && qty !== 0 && (qty % 5 !== 0)){
    alert('ملوخية العيدان: لازم الكمية تكون مضاعفات 5 (5، 10، 15...)');
    return;
  }

  if (qty === 0){
    delete cart[p.id];
  } else {
    cart[p.id] = {
      id: p.id,
      name: p.name,
      price: p.price,
      unitType: p.unitType,
      qty
    };
  }

  saveCart();
  animateAdd();
  closeQtyModal();
  renderProducts();
}

function saveCart() {
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
}

function loadCartFromStorage() {
  const saved = localStorage.getItem('cart');
  if (saved) {
    try { cart = JSON.parse(saved) || {}; } catch { cart = {}; }
  }
  updateCartCount();
}

function updateCartCount() {
  const itemCount = Object.keys(cart).length;
  const totalPrice = Object.values(cart).reduce((sum, item) => {
    return sum + (item.price * item.qty);
  }, 0);

  const countEl = document.getElementById('cartCount');
  const totalEl = document.getElementById('cartTotal');

  if (countEl) countEl.textContent = itemCount;
  if (totalEl) totalEl.textContent = `₪${totalPrice}`;
}

function goToCart() {
  window.location.href = '/review.html';
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeQtyModal();
});

document.addEventListener('DOMContentLoaded', loadProducts);
</script>

</body>
</html>
