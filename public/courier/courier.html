<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>طلبات الشليح</title>
  <link rel="stylesheet" href="/styles.css" />

  <style>
    *{ box-sizing:border-box; }

    .wrap{
      margin-top:12px;
    }

    .topbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      margin:10px 0 14px;
    }

    .filters{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .pill{
      border:1px solid #d7e2db;
      background:#fff;
      padding:10px 12px;
      border-radius:999px;
      cursor:pointer;
      font-weight:1000;
      font-size:13px;
      color:#244233;
    }

    .pill.active{
      background:#eaf5ef;
      border-color:#9dd3b1;
      color:#0f5a2a;
    }

    .countBox{
      background:#fff7e6;
      border:1px solid #ffd38a;
      padding:10px 12px;
      border-radius:12px;
      font-weight:1000;
      margin-bottom:10px;
      text-align:center;
      color:#7a4b00;
    }

    .grid{
      display:grid;
      gap:14px;
      margin:12px 0 18px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-items:start;
    }

    .card{
      background:#fffdf8;
      border:1px solid #e7e2d6;
      border-radius:20px;
      padding:14px;
      box-shadow:0 8px 20px rgba(0,0,0,.05);
    }

    .head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    .title{
      font-weight:1000;
      color:#0f2b1f;
      font-size:18px;
    }

    .meta{
      color:#6a7b72;
      font-size:12px;
      margin-top:4px;
    }

    .badge{
      padding:7px 11px;
      border-radius:999px;
      font-weight:1000;
      font-size:12px;
      border:1px solid transparent;
      white-space:nowrap;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .b-new{
      background:#fff7e6;
      border-color:#ffd38a;
      color:#7a4b00;
    }

    .b-delivery{
      background:#fff3e6;
      border-color:#ffb366;
      color:#b35a00;
    }

    .b-done{
      background:#eaf7ef;
      border-color:#a8e0be;
      color:#0f5a2a;
    }

    .b-cancel{
      background:#ffecec;
      border-color:#ffc0c0;
      color:#8a1414;
    }

    .b-contact{
      background:#f1ecff;
      border-color:#d2c0ff;
      color:#4b2b8a;
    }

    .rows{
      display:grid;
      gap:10px;
      margin:8px 0 12px;
      background:#f8fbf9;
      border:1px solid #e3ece6;
      border-radius:16px;
      padding:12px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      align-items:flex-start;
      font-size:14px;
    }

    .label{
      color:#6a7b72;
      font-size:12px;
      font-weight:900;
      min-width:80px;
    }

    .value{
      font-weight:1000;
      text-align:left;
      direction:ltr;
      color:#1d2f24;
    }

    .value-rtl{
      direction:rtl;
      text-align:right;
    }

    .addr{
      direction:rtl;
      text-align:right;
      font-weight:1000;
      color:#1d2f24;
      flex:1;
    }

    .items{
      margin-top:10px;
      border-top:1px dashed #d7e2db;
      padding-top:10px;
    }

    .items-title{
      font-weight:1000;
      margin-bottom:8px;
      color:#173527;
      font-size:15px;
    }

    .item{
      display:flex;
      justify-content:space-between;
      gap:10px;
      padding:10px 0;
      border-bottom:1px solid #f0f3f1;
      font-size:14px;
      align-items:flex-start;
    }

    .item:last-child{
      border-bottom:none;
    }

    .muted{
      color:#6a7b72;
      font-size:12px;
      line-height:1.5;
    }

    .summary-box{
      margin-top:10px;
      background:#f8fbf9;
      border:1px solid #e3ece6;
      border-radius:16px;
      padding:12px;
      display:grid;
      gap:10px;
    }

    .summary-box .row{
      margin:0;
    }

    .actions{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:10px;
      margin-top:14px;
    }

    .btn{
      border:none;
      border-radius:14px;
      padding:12px 12px;
      cursor:pointer;
      font-weight:1000;
      font-size:14px;
      text-align:center;
      transition:transform .12s ease, filter .12s ease;
      text-decoration:none;
      display:inline-block;
    }

    .btn:hover{
      filter:brightness(1.03);
    }

    .btn:active{
      transform:scale(.98);
    }

    .btn-green{
      background:#2e8b57;
      color:#fff;
    }

    .btn-call{
      background:#f5df52;
      color:#3c2b00;
    }

    .btn-blue{
      background:#2b74c7;
      color:#fff;
    }

    .btn-red{
      background:#d83a3a;
      color:#fff;
    }

    .btn-light{
      background:#eef4f0;
      color:#173527;
      border:1px solid #d7e2db;
    }

    .cancelBox{
      margin-top:12px;
      padding:12px;
      border:1px solid #ffd7d7;
      background:#fff6f6;
      border-radius:16px;
      display:none;
    }

    .cancelTitle{
      font-weight:1000;
      color:#8a1414;
      margin-bottom:8px;
    }

    .cancelBox select,
    .cancelBox input{
      width:100%;
      padding:11px 12px;
      border-radius:14px;
      border:1px solid #f2bcbc;
      margin-top:8px;
      font-weight:900;
      background:#fff;
      font-size:14px;
      outline:none;
    }

    .cancelBox select:focus,
    .cancelBox input:focus{
      box-shadow:0 0 0 4px rgba(216,58,58,.08);
      border-color:#e38d8d;
    }

    .empty{
      padding:16px;
      background:#fff;
      border:1px solid #dfe7e2;
      border-radius:16px;
      color:#6a7b72;
      text-align:center;
      font-weight:900;
      grid-column: 1 / -1;
    }

    .page-note{
      margin-bottom:10px;
      color:#6a7b72;
      font-size:13px;
      line-height:1.6;
      background:#f7fbf8;
      border:1px solid #e4eee8;
      padding:12px;
      border-radius:14px;
    }

    @media (max-width:1000px){
      .actions{
        grid-template-columns:1fr 1fr;
      }
    }

    @media (max-width:700px){
  .grid{
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap:10px;
  }

  .topbar{
    align-items:stretch;
  }

  .filters{
    width:100%;
  }

  .pill{
    flex:1 1 auto;
    text-align:center;
  }

  .actions{
    grid-template-columns:1fr;
  }

  .btn{
    width:100%;
    font-size:13px;
    padding:10px 10px;
  }

  .title{
    font-size:14px;
  }

  .meta{
    font-size:11px;
  }

  .card{
    padding:10px;
    border-radius:16px;
  }

  .rows,
  .summary-box{
    padding:8px;
    gap:8px;
  }

  .row{
    font-size:12px;
    gap:8px;
  }

  .label{
    font-size:11px;
    min-width:60px;
  }

  .value,
  .value-rtl,
  .addr{
    font-size:12px;
  }

  .items-title{
    font-size:13px;
  }

  .item{
    font-size:12px;
    padding:8px 0;
  }

  .muted{
    font-size:11px;
  }

  .badge{
    font-size:10px;
    padding:5px 8px;
  }

  .countBox,
  .page-note{
    font-size:12px;
    padding:10px;
  }
}

@media (max-width:360px){
  .grid{
    grid-template-columns:1fr;
  }
}
  </style>
</head>

<body style="text-align:right;">
  <header>
    <span>طلبات الشليح</span>
    <a href="/index.html" style="color:#fff; float:left; text-decoration:none; font-size:14px;">الرجوع للمتجر</a>
  </header>

  <div class="container wrap">
    <div class="topbar">
      <div class="filters">
        <button class="pill active" data-filter="all">الكل</button>
        <button class="pill" data-filter="new">جديد</button>
        <button class="pill" data-filter="contacted">تم التواصل</button>
        <button class="pill" data-filter="out_for_delivery">🚚 قيد التوصيل</button>
        <button class="pill" data-filter="done">تم التسليم</button>
        <button class="pill" data-filter="cancelled">ملغي</button>
      </div>

      <button class="btn btn-light" id="logoutBtn" type="button">تسجيل خروج</button>
    </div>

    <div class="page-note">
      هنا تظهر فقط الطلبات التي اختارها المسؤول للتوصيل.
    </div>

    <div id="ordersCount" class="countBox">عدد الطلبات: 0</div>

    <div id="list" class="grid">تحميل...</div>
  </div>

  <script>
    const list = document.getElementById('list');
    const ordersCount = document.getElementById('ordersCount');
    let orders = [];
    let currentFilter = 'all';

    function esc(s){
      return String(s ?? '').replace(/[&<>"']/g, (m) => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[m]));
    }

    function safeItems(items){
      if (Array.isArray(items)) return items;
      try { return JSON.parse(items || '[]'); } catch { return []; }
    }

    function formatDate(iso){
      try{
        const d = new Date(iso);
        return d.toLocaleString('ar-EG', {
          year:'numeric',
          month:'2-digit',
          day:'2-digit',
          hour:'2-digit',
          minute:'2-digit'
        });
      }catch(e){ return iso || ''; }
    }

    function statusBadge(status){
      const s = status || 'new';
      if (s === 'done') return `<span class="badge b-done">تم التسليم</span>`;
      if (s === 'out_for_delivery') return `<span class="badge b-delivery">🚚 قيد التوصيل</span>`;
      if (s === 'contacted') return `<span class="badge b-contact">تم التواصل</span>`;
      if (s === 'cancelled') return `<span class="badge b-cancel">ملغي</span>`;
      return `<span class="badge b-new">جديد</span>`;
    }

    function calcTotal(items){
      return (items || []).reduce((sum, i) => sum + (Number(i.price)||0) * (Number(i.qty)||0), 0);
    }

    function normalizePhone(phone){
      return String(phone || '').replace(/\D/g,'');
    }

    function normalizePhoneForWA(phone){
      let p = normalizePhone(phone);
      if (!p) return '';
      if (p.startsWith('0') && p.length === 10) {
        p = '972' + p.slice(1);
      }
      return p;
    }

    function buildWhatsappText(order){
      const items = (order.items || []).map(i =>
        `- ${i.name}: ${i.qty} ${i.unitType === 'bag' ? 'كيس' : 'كغم'} — ₪${(Number(i.price)||0) * (Number(i.qty)||0)}`
      ).join('\n');

      const total = calcTotal(order.items || []);
      const delivery = total >= 300 ? 0 : 30;
      const grand = total + delivery;

      return `مرحبا ${order.name || ''} 👋
تم تلقي طلبك بنجاح.
تفاصيل الطلب:
${items}

المجموع قبل التوصيل: ₪${total}
تكلفة التوصيل: ${delivery === 0 ? 'توصيل مجاني ✅' : '₪30'}
المجموع الكلي للدفع: ₪${grand}

يرجى إرسال الموقع (Location / מיקום) على واتساب لتأكيد وتجهيز الطلب.`;
    }

    function matchesFilter(order){
      if (currentFilter === 'all') return true;
      return (order.status || 'new') === currentFilter;
    }

    async function fetchOrders(){
      list.innerHTML = 'تحميل...';
      try{
        const res = await fetch(`/api/courier/orders?status=${encodeURIComponent(currentFilter)}`, { credentials:'include' });
        if(!res.ok){
          if(res.status === 401){
            window.location.href = '/courier-login';
            return;
          }
          list.innerHTML = `<div class="empty">خطأ في تحميل الطلبات.</div>`;
          return;
        }
        const data = await res.json();
        orders = (data || []).map(o => ({ ...o, items: safeItems(o.items) }));
        render();
      }catch(err){
        console.error(err);
        list.innerHTML = `<div class="empty">مشكلة اتصال بالسيرفر.</div>`;
      }
    }

    function render(){
      const filtered = orders.filter(matchesFilter);

      ordersCount.textContent = `عدد الطلبات: ${filtered.length}`;

      if(!filtered.length){
        list.innerHTML = `<div class="empty">لا توجد طلبات ضمن هذه الحالة.</div>`;
        return;
      }

      list.innerHTML = filtered.map(o => {
        const total = calcTotal(o.items || []);
        const delivery = total >= 300 ? 0 : 30;
        const grand = total + delivery;

        const phoneClean = normalizePhoneForWA(o.phone);
        const phoneCall = normalizePhone(o.phone);
        const msg = encodeURIComponent(buildWhatsappText(o));
        const wa = phoneClean ? `https://wa.me/${phoneClean}?text=${msg}` : '';
        const callLink = phoneCall ? `tel:${phoneCall}` : '';

        const itemsHtml = (o.items || []).map(it => {
          const unit = it.unitType === 'bag' ? 'كيس' : 'كغم';
          const line = (Number(it.price)||0) * (Number(it.qty)||0);
          return `
            <div class="item">
              <div>
                <strong>${esc(it.name)}</strong>
                <div class="muted">${esc(it.qty)} ${unit} × ₪${esc(it.price)}</div>
              </div>
              <div style="font-weight:1000;">₪${esc(line)}</div>
            </div>
          `;
        }).join('');

        const cancelText = esc(o.cancelReason || '');

        return `
          <div class="card">
            <div class="head">
              <div>
                <div class="title">طلب رقم #${esc(o.id)}</div>
                <div class="meta">${formatDate(o.createdAt)}</div>
              </div>
              ${statusBadge(o.status)}
            </div>

            <div class="rows">
              <div class="row">
                <div class="label">الاسم</div>
                <div class="value value-rtl">${esc(o.name)}</div>
              </div>
              <div class="row">
                <div class="label">الهاتف</div>
                <div class="value">${esc(o.phone)}</div>
              </div>
              <div class="row">
                <div class="label">البلد</div>
                <div class="value value-rtl">${esc(o.country)}</div>
              </div>
              <div class="row">
                <div class="label">العنوان</div>
                <div class="addr">${esc(o.address)}</div>
              </div>
            </div>

            <div class="items">
              <div class="items-title">المنتجات</div>
              ${itemsHtml || '<div class="muted">لا يوجد منتجات</div>'}
            </div>

            <div class="summary-box">
              <div class="row">
                <div class="label">المجموع قبل التوصيل</div>
                <div class="value">₪${esc(total)}</div>
              </div>
              <div class="row">
                <div class="label">التوصيل</div>
                <div class="value value-rtl">${delivery === 0 ? 'توصيل مجاني ✅' : '₪30'}</div>
              </div>
              <div class="row">
                <div class="label">المجموع الكلي</div>
                <div class="value">₪${esc(grand)}</div>
              </div>

              ${o.status === 'cancelled' ? `
                <div class="row" style="margin-top:2px;">
                  <div class="label">سبب الإلغاء</div>
                  <div class="addr">${cancelText || '—'}</div>
                </div>
              ` : ''}
            </div>

            <div class="actions">
              ${
                wa
                ? `<a class="btn btn-green" target="_blank" href="${wa}">واتساب</a>`
                : `<button class="btn btn-light" type="button" disabled>لا يوجد واتساب</button>`
              }

              ${
                callLink
                ? `<a class="btn btn-call" href="${callLink}">📞 اتصال</a>`
                : `<button class="btn btn-light" type="button" disabled>لا يوجد رقم</button>`
              }

              <button class="btn btn-blue" type="button" onclick="markDelivered(${esc(o.id)})">✅ تم التسليم</button>
              <button class="btn btn-red" type="button" onclick="toggleCancelBox(${esc(o.id)})">❌ ملغي</button>
            </div>

            <div class="cancelBox" id="cancelBox-${esc(o.id)}">
              <div class="cancelTitle">سبب الإلغاء</div>
              <select id="cancelSel-${esc(o.id)}">
                <option value="الزبون لا يرد">الزبون لا يرد</option>
                <option value="العنوان غير واضح">العنوان غير واضح</option>
                <option value="الزبون لغى الطلب">الزبون لغى الطلب</option>
                <option value="غير متوفر وقت التسليم">غير متوفر وقت التسليم</option>
                <option value="سبب آخر">سبب آخر</option>
              </select>
              <input id="cancelTxt-${esc(o.id)}" placeholder="إذا سبب آخر... اكتب هون" />
              <button class="btn btn-red" style="width:100%; margin-top:10px;" type="button" onclick="confirmCancel(${esc(o.id)})">تأكيد الإلغاء</button>
            </div>
          </div>
        `;
      }).join('');
    }

    window.toggleCancelBox = function(id){
      const box = document.getElementById('cancelBox-' + id);
      if (!box) return;
      box.style.display = box.style.display === 'block' ? 'none' : 'block';
    };

    window.markDelivered = async function(id){
      try{
        const res = await fetch(`/api/courier/orders/${id}/delivered`, {
          method:'PUT',
          credentials:'include'
        });
        if(!res.ok){
          if(res.status === 401){
            window.location.href = '/courier-login';
            return;
          }
          alert('فشل تحديث الحالة');
          return;
        }
        await fetchOrders();
      }catch(err){
        console.error(err);
        alert('مشكلة اتصال');
      }
    };

    window.confirmCancel = async function(id){
      const sel = document.getElementById('cancelSel-' + id);
      const txt = document.getElementById('cancelTxt-' + id);
      let reason = (sel?.value || '').trim();
      const extra = (txt?.value || '').trim();

      if (reason === 'سبب آخر' && extra) reason = extra;
      if (!reason) {
        alert('اكتب سبب الإلغاء');
        return;
      }

      try{
        const res = await fetch(`/api/courier/orders/${id}/cancel`, {
          method:'PUT',
          headers:{'Content-Type':'application/json'},
          credentials:'include',
          body: JSON.stringify({ reason })
        });
        if(!res.ok){
          if(res.status === 401){
            window.location.href = '/courier-login';
            return;
          }
          alert('فشل الإلغاء');
          return;
        }
        await fetchOrders();
      }catch(err){
        console.error(err);
        alert('مشكلة اتصال');
      }
    };

    document.querySelectorAll('.pill').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        fetchOrders();
      });
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/courier/logout', { method:'POST', credentials:'include' }).catch(()=>{});
      window.location.href = '/courier-login';
    });

    fetchOrders();
  </script>
</body>
</html>
